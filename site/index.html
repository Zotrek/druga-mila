<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Druga Mila — test Pages</title>
  <style>
    :root {
      --bg: #0f1419;
      --fg: #e7ecf1;
      --muted: #9aa7b5;
      --accent: #3d8bfd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, #1a3a5c 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 90% 80%, #1e2a1a 0%, transparent 45%),
        var(--bg);
      color: var(--fg);
      padding: 1.5rem;
    }
    main {
      max-width: 36rem;
      text-align: center;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 1rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid #2a3a4a;
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Druga Mila</h1>
    <p>
      Testowy plik dla GitHub Pages (folder <code>/site</code>).
      Docelowa mapa Leaflet pojawi się po implementacji i <code>npm run generate</code>.
    </p>
    <span class="badge">Pages OK — placeholder</span>
  </main>
</body>
</html>
