    function pinIcon(kolor, highlight) {

        iconSize: [24, 24],

    function normalizeForAddressSearchMap(text) {
      var s = String(text).normalize('NFD').replace(/\p{M}/gu, '');
      s = s
        .replace(/ł/g, 'l').replace(/Ł/g, 'l')
        .replace(/ą/g, 'a').replace(/Ą/g, 'a')
        .replace(/ć/g, 'c').replace(/Ć/g, 'c')
        .replace(/ę/g, 'e').replace(/Ę/g, 'e')
        .replace(/ń/g, 'n').replace(/Ń/g, 'n')
        .replace(/ó/g, 'o').replace(/Ó/g, 'o')
        .replace(/ś/g, 's').replace(/Ś/g, 's')
        .replace(/ź/g, 'z').replace(/Ź/g, 'z')
        .replace(/ż/g, 'z').replace(/Ż/g, 'z');
      return s.toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function mapPointMatchesSearchMap(p, query) {
      var q = normalizeForAddressSearchMap(query);
      if (!q) return true;
      if (normalizeForAddressSearchMap(p.adres).indexOf(q) !== -1) return true;
      if (normalizeForAddressSearchMap(p.nazwaPelna).indexOf(q) !== -1) return true;
      if (normalizeForAddressSearchMap(p.nazwaSkrocona).indexOf(q) !== -1) return true;
      return false;
    }

    function mapPointMatchesColorFilterMap(colorKind, mode) {
      return mode === 'wszystkie' || colorKind === mode;
    }

    function escapeHtmlMap(s) {
      return String(s)

    }

    function applyAddressSearch() {
      var inputEl = document.getElementById('map-address-search');
      var statusEl = document.getElementById('map-search-status');
      var raw = inputEl ? inputEl.value : '';
      var hasSearch = String(raw).trim().length > 0;
      var mode = getColorFilterMode();
      var matchMarkers = [];
      var matchCount = 0;
      var visibleCount = 0;

      markerEntries.forEach(function(entry) {
        var cMatch = mapPointMatchesColorFilterMap(entry.p.colorKind, mode);
        if (!cMatch) {
          entry.marker.setOpacity(0);
          setMarkerClickable(entry.marker, false);
          entry.marker.setIcon(pinIcon(entry.p.kolor, false));
          return;
        }
        var sMatch = mapPointMatchesSearchMap(entry.p, raw);
        if (hasSearch && !sMatch) {
          entry.marker.setOpacity(0.28);
          setMarkerClickable(entry.marker, true);
          entry.marker.setIcon(pinIcon(entry.p.kolor, false));
          return;
        }
        visibleCount++;
        if (hasSearch && sMatch) {
          matchCount++;
          matchMarkers.push(entry.marker);
        }
        entry.marker.setOpacity(1);
        setMarkerClickable(entry.marker, true);
        if (typeof refreshMarkerIcon === 'function') {
          refreshMarkerIcon(entry);
        } else {
          entry.marker.setIcon(pinIcon(entry.p.kolor, hasSearch && sMatch));
        }
      });

      if (statusEl) {
        if (hasSearch) {
          statusEl.textContent = matchCount === 0
            ? 'Brak dopasowań'
            : (matchCount === 1 ? '1 dopasowanie' : matchCount + ' dopasowań');
        } else {
          statusEl.textContent = 'Widoczne: ' + visibleCount;
        }
      }
      if (hasSearch) scheduleSearchViewport(matchMarkers);
    }

    function getBulkSelectedLoadIdxs() {
      var out = [];

      var hint = document.getElementById('doc-modal-hint');
      var shared = collectSharedForm();
      if (btn) btn.disabled = true;
      ensureDocxLibrariesLoaded().then(function() {
        var generated = 0;
        var failed = 0;
        var chain = Promise.resolve();
        indices.forEach(function(loadIdx, jobIdx) {
          chain = chain.then(function() {
            var zal = LOAD_POINTS[loadIdx];
            if (!zal) return Promise.resolve();
            if (hint) {
              hint.textContent = 'Generowanie ' + (jobIdx + 1) + ' / ' + indices.length + ': ' +
                (zal.nazwaSkrocona || zal.nazwaPelna);
            }
            if (!WEBAPP_URL) {
              renderAndDownloadDocx(zal, shared.pr, shared.md, shared.dataVal, shared.awizacja, '', { closeModal: false });
              generated += 1;
              return delayMs(400);
            }
            return appendFormatkaRow(buildFormatkaPayload(zal, shared, '')).then(function(resp) {
              if (!resp || !resp.ok) {
                throw new Error(resp && resp.error ? resp.error : 'błąd API');
              }
              renderAndDownloadDocx(
                zal, shared.pr, shared.md, shared.dataVal, shared.awizacja,
                String(resp.numer || ''),
                { closeModal: false }
              );
              generated += 1;
              return delayMs(450);
            });
          }).catch(function(err) {
            console.error(err);
            failed += 1;
          });
        });
        return chain.then(function() {
          clearBulkSelection();
          closeDocModal();
          if (failed > 0) {
            alert('Hurt: zapisano/pobrano ' + generated + ', błędy: ' + failed + '.');
          }
        });
      }).catch(function(err) {
        console.error(err);
        alert('Nie udało się uruchomić generacji hurtowej.');
      }).finally(function() {
        if (btn) btn.disabled = false;
      });
    }
    document.getElementById('doc-btn-cancel').addEventListener('click', closeDocModal);
    document.getElementById('doc-btn-generate').addEventListener('click', generateDocxLocal);
    document.getElementById('doc-modal').addEventListener('click', function(ev) {
      if (ev.target === this) closeDocModal();
    });
    var manualBulkCancel = document.getElementById('manual-bulk-cancel');
    var manualBulkNext = document.getElementById('manual-bulk-next');
    var manualBulkSearch = document.getElementById('manual-bulk-search');
    var manualBulkPicker = document.getElementById('manual-bulk-picker');
    if (manualBulkCancel) manualBulkCancel.addEventListener('click', closeManualBulkPicker);
    if (manualBulkNext) manualBulkNext.addEventListener('click', confirmManualBulkPicker);
    if (manualBulkSearch) manualBulkSearch.addEventListener('input', renderManualBulkList);
    if (manualBulkPicker) {
      manualBulkPicker.addEventListener('click', function(ev) {
        if (ev.target === this) closeManualBulkPicker();
      });
    }
    var dateTextEl = document.getElementById('doc-inp-data');
    var datePickEl = document.getElementById('doc-inp-data-picker');
    var dateCalBtn = document.getElementById('doc-btn-data-cal');
    if (dateTextEl) {
      dateTextEl.addEventListener('blur', function() {
        var f = formatLoadDates(dateTextEl.value).doc;
        if (f) dateTextEl.value = f;
        syncDatePickerFromText();
      });
      dateTextEl.addEventListener('change', syncDatePickerFromText);
    }
    if (datePickEl) {
      datePickEl.addEventListener('change', syncDateTextFromPicker);
      datePickEl.addEventListener('input', syncDateTextFromPicker);
    }
    if (dateCalBtn) {
      dateCalBtn.addEventListener('click', function(ev) {
        ev.preventDefault();
        openDateCalendar();
      });
    }
  
    applyAddressSearch();
  </script>
</body>
</html>
